<svg viewBox="0 0 480 140" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ReEstrena Q50">
  <defs>
    <linearGradient id="tagGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F4A340"/>
      <stop offset="1" stop-color="#EE8B2E"/>
    </linearGradient>
  </defs>

  <!-- Icon: hanger with a price tag -->
  <g transform="translate(10,10)">
    <circle cx="60" cy="60" r="58" fill="#0F766E"/>
    <!-- hanger hook -->
    <path d="M60 22 C60 14 68 14 68 22" stroke="#FFF8EE" stroke-width="5" fill="none" stroke-linecap="round"/>
    <circle cx="60" cy="34" r="4.5" fill="#FFF8EE"/>
    <!-- hanger body -->
    <path d="M60 34 L30 62 Q60 78 90 62 L60 34 Z" fill="none" stroke="#FFF8EE" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- price tag -->
    <g transform="translate(64,58) rotate(18)">
      <path d="M0 6 L20 6 L30 16 L20 26 L0 26 Z" fill="url(#tagGrad)" stroke="#FFF8EE" stroke-width="2.5" stroke-linejoin="round"/>
      <circle cx="7" cy="16" r="2.6" fill="#FFF8EE"/>
    </g>
  </g>

  <!-- Wordmark -->
  <g transform="translate(140,0)">
    <text x="0" y="66" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="40" fill="#1F2A28">Re<tspan fill="#0F766E">Estrena</tspan></text>
    <g transform="translate(0,80)">
      <rect x="0" y="0" width="92" height="34" rx="17" fill="url(#tagGrad)"/>
      <text x="46" y="24" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="22" fill="#FFF8EE" text-anchor="middle">Q50</text>
    </g>
    <text x="104" y="104" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="16" fill="#5B6664">ropa de segunda, buena onda</text>
  </g>
</svg>
